services:
  web:
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        alembic upgrade head
        exec uvicorn user_service.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2); print('ok')\nPY"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
